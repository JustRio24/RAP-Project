<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Roof shape -->
  <polygon points="80,220 256,80 432,220" fill="white" opacity="0.95"/>
  <!-- Building body -->
  <rect x="140" y="220" width="232" height="170" fill="white" opacity="0.9" rx="4"/>
  <!-- Door -->
  <rect x="214" y="310" width="84" height="80" fill="#0284c7" rx="4"/>
  <!-- Windows -->
  <rect x="156" y="250" width="54" height="44" fill="#0284c7" rx="4" opacity="0.8"/>
  <rect x="302" y="250" width="54" height="44" fill="#0284c7" rx="4" opacity="0.8"/>
  <!-- Truss lines on roof -->
  <line x1="256" y1="80" x2="140" y2="220" stroke="#0284c7" stroke-width="6" opacity="0.4"/>
  <line x1="256" y1="80" x2="372" y2="220" stroke="#0284c7" stroke-width="6" opacity="0.4"/>
  <line x1="198" y1="150" x2="314" y2="150" stroke="#0284c7" stroke-width="4" opacity="0.3"/>
</svg>